<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>简历大师 · 极简版</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-a"></div>
    <div class="bg-glow bg-glow-b"></div>

    <main class="app-shell">
      <header class="topbar">
        <div class="brand">简历大师</div>
        <div class="badge">Vibe Coding UI</div>
      </header>

      <section class="hero card">
        <h1>输入 JD + 原始简历，一键生成定制版</h1>
        <p>遵循真实性、动宾结构、数字化结果、1234布局与单页预算约束。</p>
      </section>

      <section class="layout-grid">
        <form id="resumeForm" class="card panel">
          <h2>输入区</h2>

          <label class="field">
            <span>JD 文本</span>
            <textarea id="jdText" rows="7" placeholder="粘贴岗位描述..."></textarea>
          </label>

          <label class="field">
            <span>原始简历文本</span>
            <textarea id="resumeText" rows="10" placeholder="粘贴原始简历..."></textarea>
          </label>

          <div class="budget-grid">
            <label class="field small">
              <span>总条数预算</span>
              <input id="budgetBullets" type="number" value="10" min="4" max="20" />
            </label>
            <label class="field small">
              <span>总字符预算</span>
              <input id="budgetChars" type="number" value="900" min="300" max="2000" />
            </label>
            <label class="field small">
              <span>每行字符</span>
              <input id="lineChars" type="number" value="38" min="20" max="60" />
            </label>
            <label class="field small">
              <span>每条最大行数</span>
              <input id="lineCount" type="number" value="2" min="1" max="3" />
            </label>
          </div>

          <div class="actions">
            <button type="submit" class="btn btn-primary">生成预览</button>
            <button type="button" id="copyBtn" class="btn">复制 JSON</button>
          </div>
          <p class="hint">当前前端为极简演示页，可对接你的 Python API。</p>
        </form>

        <section class="card panel output-panel">
          <div class="output-head">
            <h2>输出区</h2>
            <span id="statusTag" class="status">待生成</span>
          </div>
          <pre id="outputBox">{}</pre>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
  </html>
